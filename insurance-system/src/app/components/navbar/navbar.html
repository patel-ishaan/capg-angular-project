<header class="navbar">
  <div class="container nav-container">
    <a class="brand" routerLink="/" (click)="closeMenu()">
      <img src="https://static.vecteezy.com/system/resources/previews/043/211/939/non_2x/a-green-leaf-and-cross-positioned-on-top-of-a-shield-creating-an-emblem-produce-a-clean-and-elegant-logo-for-a-health-insurance-company-emphasizing-simplicity-and-clarity-free-vector.jpg" alt="Logo" class="brand-logo" />
      ClaimIt
    </a>
    <button
      class="mobile-menu-btn"
      (click)="toggleMenu()"
      aria-label="Menu"
      [attr.aria-expanded]="mobileMenuOpen"
    >
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" [class.show]="mobileMenuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a>
      <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">Dashboard</a>
      <a routerLink="/catalog" routerLinkActive="active" (click)="closeMenu()">Policies</a>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
      <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a>
      <div class="nav-buttons">
        @if (!loginService.isAuthenticated()) {
          <a class="btn-outline" routerLink="/login" (click)="closeMenu()"> Login </a>
          <a class="btn-primary" routerLink="/register" (click)="closeMenu()"> Register </a>
        } @else {
          <a class="btn-outline" routerLink="/profile" (click)="closeMenu()">
            {{ loginService.currentUser()?.name }}
          </a>
          <button class="btn-primary" (click)="logout(); closeMenu()">Logout</button>
        }
      </div>
    </div>
  </div>
</header>
